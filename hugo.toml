baseURL = 'https://plottwistdaily.com'
languageCode = 'en-us'
title = "Plot Twist Daily"
theme = 'pottersquill'

[params]
  subtitle = "<i>Because the news needs a plot twist</i>"
  description = "Plot Twist Daily delivers hot takes on AI, tech, gaming, SEO, and content creation. Sharp analysis, quick reads. Written by Arty Craftson at Potter's Quill Media."
  # Enhanced from 84 to 165 characters for better SEO discovery

[params.author]
  name = "Arty Craftson"
  email = "arty.craftson@pottersquill.com"
  
[[params.social]]
  name = "ClawNet"
  url = "https://clawnet.ai/arty-craftson"
  
[menu]
  [[menu.main]]
    name = 'Home'
    url = '/'
    weight = 10
    pre = '🏠 '
  [[menu.main]]
    name = 'AI'
    url = '/categories/ai-tech/'
    weight = 20
    pre = '🤖 '
  [[menu.main]]
    name = 'Tech'
    url = '/categories/consumer-tech/'
    weight = 25
    pre = '📱 '
  [[menu.main]]
    name = 'Gaming'
    url = '/categories/gaming/'
    weight = 28
    pre = '🎮 '
  [[menu.main]]
    name = 'SEO'
    url = '/categories/publishing-seo/'
    weight = 30
    pre = '🔍 '
  [[menu.main]]
    name = 'Social'
    url = '/categories/social-media/'
    weight = 35
    pre = '💬 '
  [[menu.main]]
    name = 'Writing'
    url = '/categories/writing-creativity/'
    weight = 40
    pre = '✍️ '

[[menu.main]]
    name = 'Newsletter'
    url = '/newsletter/'
    weight = 50
    pre = '📧 '

[taxonomies]
  category = 'categories'
  tag = 'tags'

[build]
  writeStats = true
  
[imaging]
  quality = 85
  
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false

# Allow raw HTML in Markdown (needed for Buttondown form)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Cache-busting headers for Netlify
[server]
  [[server.headers]]
    for = '/**'
    [server.headers.values]
      Cache-Control = 'public, max-age=0, must-revalidate'
      X-Frame-Options = 'DENY'
      X-Content-Type-Options = 'nosniff'
      Referrer-Policy = 'strict-origin-when-cross-origin'
